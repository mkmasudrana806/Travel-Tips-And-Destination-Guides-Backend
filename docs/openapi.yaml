openapi: 3.0.3
info:
  title: Travel-Tips-And-Guideline
  description: >-
    # Travel Share - a Social Platform for Traveler


    Backend API for a social travel platform where users can share travel
    experiences, create travel plans, interact with posts, and collaborate with
    other travelers.


    ## Base URL


    - Localhost: `http://localhost:5000/api/v1`
        
    - Live API: `https://travelshare-backend.vercel.com/api/v1`
        

    ## Authentication


    Most endpoints require a JWT access token.


    Header format:


    `Authorization: Bearer accessToken`
  version: 1.0.0
  contact: {}
servers:
  - url: http://localhost:{port}/api/v1
    variables:
      port:
        default: "5000"
  - url: https://travelshare-backend.vercel.com/api/v1
